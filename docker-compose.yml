version: "3.9"

# ============================================================
# Claw Personal / NanoClaw — Fase 1 + 2: Infrastruktur & Orkestrator
# ============================================================
# Denne filen setter opp:
#   1. LiteLLM som en intern proxy-container (Fase 1)
#   2. Orkestratoren som håndterer onboarding og container-livssyklus (Fase 2)
#
# Brukercontainere (NanoClaw) kobles til det lukkede nettverket
# "claw-internal" og sender alle LLM-forespørsler gjennom
# LiteLLM-proxyen i stedet for direkte til Anthropic.
#
# Bruk:
#   1. Kopier .env.example til .env og fyll inn verdier
#   2. Kjør: docker compose up -d
#   3. Verifiser LiteLLM:     curl http://localhost:4000/health
#   4. Verifiser Orkestrator:  curl http://localhost:3000/health
# ============================================================

services:
  # -----------------------------------------------------------
  # Fase 1: LiteLLM Proxy — Oversettelseslag for LLM-forespørsler
  # -----------------------------------------------------------
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    restart: unless-stopped
    ports:
      # Eksponeres KUN på localhost for admin/debugging under utvikling.
      # I produksjon: fjern denne porten eller bruk en reverse proxy (nginx/caddy).
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    networks:
      - claw-internal
      - claw-external
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect(('localhost', 4000))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------
  # Fase 2: Orkestrator — Backend for "Zero Delay" onboarding
  # -----------------------------------------------------------
  # Orkestratoren er hjertet i Control Plane. Den:
  #   - Mottar webhooks fra betalingsleverandører
  #   - Genererer interne tokens for brukerautentisering
  #   - Oppretter Virtual Keys via LiteLLM
  #   - Spinner opp isolerte NanoClaw-containere per bruker
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: claw-orchestrator
    restart: unless-stopped
    ports:
      # Eksponeres for å motta webhooks fra betalingsleverandører.
      # I produksjon: bruk en reverse proxy (nginx/caddy) foran.
      - "${ORCHESTRATOR_PORT:-3000}:3000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_INTERNAL_URL=http://litellm-proxy:4000
      - ORCHESTRATOR_PORT=3000
      - NANOCLAW_IMAGE=${NANOCLAW_IMAGE:-nanoclaw-base:latest}
      - DOCKER_NETWORK=claw-internal
      # Fase 3: Google OAuth (Magic Connect)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      # Fase 3: Session & Vault
      - SESSION_SECRET=${SESSION_SECRET}
      - VAULT_MASTER_KEY=${VAULT_MASTER_KEY}
      # Fase 4: Database
      - DATABASE_URL=${DATABASE_URL}
      # Fase 5: Stripe Betalingsintegrasjon
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRICE_ID=${STRIPE_PRICE_ID}
      - STRIPE_SUCCESS_URL=${STRIPE_SUCCESS_URL}
      - STRIPE_CANCEL_URL=${STRIPE_CANCEL_URL}
      # Fase 6: Frontend Portal
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
    volumes:
      # Docker socket — gir Orkestratoren tilgang til å styre containere.
      # VIKTIG: Dette gir full Docker-kontroll. Sikres i produksjon.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      # Orkestratoren trenger begge nettverk:
      #   - claw-internal: for å kommunisere med LiteLLM-proxyen og databasen
      #   - claw-external: for å motta webhooks fra internett
      - claw-internal
      - claw-external
    depends_on:
      litellm-proxy:
        condition: service_healthy
      db:
        condition: service_healthy

  # -----------------------------------------------------------
  # Fase 4: Database — PostgreSQL for sikker lagring
  # -----------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: claw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claw_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claw_secret}
      POSTGRES_DB: ${POSTGRES_DB:-claw_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - claw-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claw_admin} -d ${POSTGRES_DB:-claw_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # Fase 6: Frontend Portal — "The Gateway" (Next.js)
  # -----------------------------------------------------------
  # Brukerportalen som håndterer onboarding, betaling og
  # Magic Connect. Kommuniserer med Orkestratoren via API.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    container_name: claw-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    networks:
      - claw-external
    depends_on:
      orchestrator:
        condition: service_started

networks:
  # Lukket internt nettverk — ingen direkte internett-tilgang.
  # NanoClaw-brukercontainere kobles KUN til dette nettverket.
  # De kan snakke med litellm-proxy:4000, men ikke med internett.
  claw-internal:
    name: claw-internal
    driver: bridge
    internal: true

  # Eksternt nettverk — gir LiteLLM-proxyen internett-tilgang
  # slik at den kan videresende forespørsler til Anthropic API.
  # Brukercontainere skal ALDRI kobles til dette nettverket.
  claw-external:
    name: claw-external
    driver: bridge

volumes:
  # Persistent lagring for PostgreSQL-databasen
  postgres_data:
    name: claw-postgres-data

# -----------------------------------------------------------
# NanoClaw Base Image (Fase 7)
# -----------------------------------------------------------
# Brukercontainere bygges fra dette imaget. Orkestratoren
# spinner dem opp dynamisk via docker.service.js.
#
# Bygg manuelt:
#   docker build -t nanoclaw-base:latest ./nanoclaw
#
# Eller via docker compose:
#   docker compose build nanoclaw-base
# -----------------------------------------------------------

